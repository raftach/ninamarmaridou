<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/white-logo-bigger.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nina Marmaridou | Interior Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Header -->
  <header class="navbar">
    <div class="logo">
      <a href="/" data-link>
        <img src="/white-logo-bigger.svg" alt="Nina Marmaridou Logo" class="logo-img">
      </a>
    </div>
    <nav class="nav-links">
      <a href="/" data-link data-i18n="nav_home">Home</a>
      <a href="/services" data-link data-i18n="nav_services">Services</a>
      <a href="/about" data-link data-i18n="nav_about">About</a>
      <a href="/contact" data-link data-i18n="nav_contact">Contact</a>
    </nav>
    <div class="lang-switcher">
      <button id="lang-el" class="lang-btn">EL</button>
      <span class="lang-sep" style="color: rgba(255,255,255,0.3);">|</span>
      <button id="lang-en" class="lang-btn active">EN</button>
    </div>
    <!-- Hamburger for mobile -->
    <button class="menu-toggle" id="mobile-menu-btn">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Mobile Nav -->
  <div class="mobile-nav" id="mobile-nav">
    <nav class="mobile-nav-links">
      <a href="/" data-link data-i18n="nav_home" class="mobile-link">Home</a>
      <a href="/services" data-link data-i18n="nav_services" class="mobile-link">Services</a>
      <a href="/about" data-link data-i18n="nav_about" class="mobile-link">About</a>
      <a href="/contact" data-link data-i18n="nav_contact" class="mobile-link">Contact</a>
    </nav>
  </div>

  <!-- Main Content App Mount Point -->
  <main id="app"></main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; <span id="year"></span> Nina Marmaridou. <span data-i18n="footer_rights">All rights reserved.</span></p>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
